<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Contato - GigaTech</title>
    <link rel="stylesheet" href="estilo.css">
</head>
<body>

    <header id="cabecalho">
        <h1>GigaTech</h1>
        <p>Sua loja de tecnologia</p>
    </header>

    <nav id="menu">
        <a href="index.html">Inicio</a>
        <a href="sobre.html">Sobre</a>
        <a href="contato.html">Contato</a>
    </nav>

    <div class="conteudo">

        <section class="secao">
            <h2>Fale conosco</h2>
            <p>Tem alguma duvida ou sugestao? Preencha o formulario abaixo e entraremos em contato.</p>

            <form class="formulario" action="#" method="post">

                <label for="nome">Nome completo:</label>
                <input type="text" id="nome" name="nome" placeholder="Digite seu nome" required>

                <label for="email">E-mail:</label>
                <input type="email" id="email" name="email" placeholder="Digite seu e-mail" required>

                <label for="telefone">Telefone:</label>
                <input type="tel" id="telefone" name="telefone" placeholder="(XX) XXXXX-XXXX">

                <label for="assunto">Assunto:</label>
                <select id="assunto" name="assunto">
                    <option value="">Selecione</option>
                    <option value="duvida">Duvida sobre produto</option>
                    <option value="pedido">Status do pedido</option>
                    <option value="troca">Troca ou devolucao</option>
                    <option value="sugestao">Sugestao</option>
                </select>

                <label for="mensagem">Mensagem:</label>
                <textarea id="mensagem" name="mensagem" placeholder="Digite sua mensagem" required></textarea>

                <button type="submit" class="botao">Enviar</button>

            </form>
        </section>

    </div>

    <footer id="rodape">
        <p>Rua das Tecnologias, 1234 - Centro</p>
        <p>Telefone: (11) 99999-8888</p>
        <p>E-mail: contato@gigatech.com.br</p>
        <p>&copy; 2025 GigaTech - Todos os direitos reservados</p>
    </footer>

</body>
</html>
